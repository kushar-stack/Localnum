<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Busy Brief — Latest News</title>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <header class="site-header">
    <div class="brand">Busy Brief</div>
    <div class="tagline">Minimal summaries. Maximum signal.</div>
  </header>

  <main class="content">
    <section class="controls" aria-label="News controls">
      <div class="control-row">
        <div class="mode-toggle" role="group" aria-label="Mode">
          <button class="mode-btn" data-mode="headlines" id="modeHeadlines">Headlines</button>
          <button class="mode-btn" data-mode="search" id="modeSearch">Search</button>
        </div>
        <input id="query" type="text" placeholder="Search topics (e.g. AI, markets, climate)" />
        <button id="refresh">Refresh</button>
      </div>
      <div class="control-row secondary">
        <select id="country" aria-label="Country">
          <option value="us" selected>US</option>
          <option value="gb">UK</option>
          <option value="ca">Canada</option>
          <option value="au">Australia</option>
          <option value="in">India</option>
        </select>
        <div class="chips" id="categoryChips" role="listbox" aria-label="Category">
          <button class="chip" data-category="">All</button>
          <button class="chip" data-category="business">Business</button>
          <button class="chip" data-category="technology">Tech</button>
          <button class="chip" data-category="science">Science</button>
          <button class="chip" data-category="health">Health</button>
          <button class="chip" data-category="sports">Sports</button>
          <button class="chip" data-category="entertainment">Culture</button>
        </div>
      </div>
      <div class="control-row tertiary">
        <select id="briefing" aria-label="Briefing length">
          <option value="quick">2-Min Brief</option>
          <option value="standard" selected>Standard Brief</option>
          <option value="deep">Deep Dive</option>
        </select>
        <select id="range" aria-label="Search range">
          <option value="24h">Past 24h</option>
          <option value="7d" selected>Past 7 days</option>
          <option value="30d">Past 30 days</option>
        </select>
        <label class="toggle">
          <input id="exact" type="checkbox" />
          <span>Exact match</span>
        </label>
      </div>
      <div class="hint" id="hint"></div>
    </section>

    <section id="status" class="status" role="status" aria-live="polite"></section>

    <section id="news" class="news-grid" aria-label="Latest news"></section>

    <div class="load-more-wrap">
      <button id="loadMore" class="ghost">Load more</button>
    </div>
  </main>

  <footer class="site-footer">
    <span>Powered by NewsAPI.org</span>
  </footer>

  <script src="app.js?v=5"></script>
</body>
</html>
